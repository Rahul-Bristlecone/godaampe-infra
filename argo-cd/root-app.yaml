# argo-cd/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: godaampe-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<org>/<repo>.git
    targetRevision: HEAD
    path: argo-cd/child-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true