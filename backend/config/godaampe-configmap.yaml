apiVersion: v1
kind: ConfigMap
metadata:
  name: godaampe-config
  namespace: godaampe
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  MYSQL_DATABASE: godaampe_db
  DB_HOST: godaampe-db
  DB_PORT: "3306"
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
  ALLOWED_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:3000,http://localhost:3000"
