apiVersion: v1
kind: PersistentVolume
metadata:
  name: db-pv
  namespace: godaampe
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /mnt/data/godaampe