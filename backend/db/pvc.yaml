apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: godaampe
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard   # Minikube usually has a "standard" StorageClass
  # storageClassName: gp2   # For AWS EKS, use "gp2" or the appropriate StorageClass for your cloud provider