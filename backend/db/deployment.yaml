apiVersion: apps/v1
kind: Deployment
metadata:
  name: godaampe-db
  namespace: godaampe
spec:
  selector:
    matchLabels:
      app: godaampe-db
  replicas: 1
  template:
    metadata:
      labels:
        app: godaampe-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        envFrom:
        - secretRef:
            name: godaampe-secrets
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: godaampe-db
  namespace: godaampe  
spec:
  selector:
    app: godaampe-db
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP