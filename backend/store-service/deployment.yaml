apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-deployment
  namespace: godaampe
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: store-service
  template:
    metadata:
      labels:
        app: store-service
    spec:
      containers:
      - name: store-service
        image: sharma92/daemons:store-service-latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: godaampe-secrets
        - configMapRef:
            name: godaampe-config
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "125m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: store-service
  namespace: godaampe
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ClusterIP
  selector:
    app: store-service
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000