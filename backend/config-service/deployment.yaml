apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-deployment
  namespace: godaampe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
      - name: config-service
        image: sharma92/daemons:config-service-latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: godaampe-secrets
        - configMapRef:
            name: godaampe-config
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "125m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: godaampe
spec:
  type: ClusterIP
  selector:
    app: config-service
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000