apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: godaampe
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: user-service
  # pod template to create pods with the same labels as the selector
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: sharma92/daemons:user-service-871e302e1bba7cb5cb4c192417278d20ba25b8bc
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: godaampe-secrets
        - configMapRef:
            name: godaampe-config
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "125m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: godaampe
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  revisionHistoryLimit: 2
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: 5000
      targetPort: 5000